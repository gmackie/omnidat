name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gmacko
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: https://github.com/pnpm/action-setup@v4
        with:
          package_json_file: gmacko/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: gmacko/.nvmrc
          cache: pnpm
          cache-dependency-path: gmacko/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Report CI result to ForgeGraph
        if: always()
        env:
          FG_CI_TOKEN: ${{ secrets.FORGEGRAPH_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            STATUS="cancelled"
          else
            STATUS="failure"
          fi
          REPO_FULL="${{ github.repository }}"
          OWNER="${REPO_FULL%%/*}"
          REPO="${REPO_FULL##*/}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          curl -sf -X POST "https://forgegraf.com/api/fg/ci/report" \
            -H "Authorization: Bearer ${FG_CI_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"owner\": \"${OWNER}\",
              \"repo\": \"${REPO}\",
              \"sha\": \"${{ github.sha }}\",
              \"branch\": \"${BRANCH}\",
              \"status\": \"${STATUS}\",
              \"runId\": \"${{ github.run_id }}\",
              \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"workflowName\": \"CI\"
            }" || echo "::warning::Failed to report CI result to ForgeGraph"

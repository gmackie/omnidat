services:
  # ─── Local PostgreSQL for development ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gmacko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmacko_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis for caching (optional) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gmacko-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stripe CLI (for webhook testing) ──────────────────────────────
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: gmacko-stripe
    command: listen --forward-to http://web:3000/api/webhooks/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}
    profiles:
      - stripe
    depends_on:
      - web

  # ─── Next.js application (production build) ────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gmacko_dev
        AUTH_SECRET: ${AUTH_SECRET:-development-secret-change-in-production}
        SKIP_ENV_VALIDATION: "true"
    container_name: gmacko-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gmacko_dev
      DATABASE_DRIVER: pg
      AUTH_SECRET: ${AUTH_SECRET:-development-secret-change-in-production}
      NODE_ENV: production
      # Sentry (optional)
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # PostHog (optional)
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      # Stripe (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: gmacko-network

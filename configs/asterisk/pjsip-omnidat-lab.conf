; OMNIDAT lab PJSIP scaffold.
; Not production-ready. Use only for local simulation and mapping endpoint names.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; Fake ShadyTel ingress trunk for lab testing.
[shadytel-lab]
type=endpoint
transport=transport-udp
context=omnidat-inbound
disallow=all
allow=ulaw
allow=alaw
direct_media=no
aors=shadytel-lab

[shadytel-lab]
type=aor
contact=sip:127.0.0.1:5062

; OmniTel is the bootstrapped ShadyTel-style peer for local SIP testing.
; It can run on the same Raspberry Pi Asterisk host or a second lab PBX.
[omnitel-lab]
type=endpoint
transport=transport-udp
context=omnidat-inbound
disallow=all
allow=ulaw
allow=alaw
direct_media=no
aors=omnitel-lab

[omnitel-lab]
type=aor
contact=sip:127.0.0.1:5063

; Endpoint names used by extensions-omnidat.conf.
; Define real auth/AOR/contact sections when hardware or softphones are chosen.
;
; operator-01
; operator-02
; modem-01 ... modem-06
; modem-sysop
; modem-shell
; modem-uucp
; modem-filedrop
; modem-test
; pad-01 ... pad-04
; pad-update-01
; pad-update-02
; pad-directory-01
; pad-directory-02
; pad-food-01
; pad-food-02
; pad-passport-01
; pad-passport-02
; fax-01

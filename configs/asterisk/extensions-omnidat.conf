; OMNIDAT Exchange 88 dialplan sketch.
; Not production-ready. Use as a map from data/services.json to PBX behavior.

[omnidat-inbound]
exten => 8800,1,Goto(omnidat-operator,trustdesk,1)
exten => 8801,1,Goto(omnidat-ivr,network-status,1)
exten => 8802,1,Goto(omnidat-hunt,bbs-main,1)
exten => 8803,1,Goto(omnidat-hunt,bbs-experimental,1)
exten => 8804,1,Goto(omnidat-direct,sysop-access,1)
exten => 8805,1,Goto(omnidat-hunt,modem-pool,1)
exten => 8806,1,Goto(omnidat-direct,terminal-login,1)
exten => 8807,1,Goto(omnidat-direct,store-forward,1)
exten => 8808,1,Goto(omnidat-direct,file-drop,1)
exten => 8809,1,Goto(omnidat-direct,test-modem,1)
exten => 8810,1,Goto(omnidat-hunt,packet-main,1)
exten => 8811,1,Goto(omnidat-hunt,terminal-updates,1)
exten => 8812,1,Goto(omnidat-hunt,nightmarkt-directory,1)
exten => 8813,1,Goto(omnidat-hunt,miliways-food,1)
exten => 8814,1,Goto(omnidat-hunt,activity-passport,1)
exten => 8815,1,Goto(omnidat-ivr,media-request,1)
exten => 8816,1,Goto(omnidat-apps,shadyroulette-main,1)
exten => 8817,1,Goto(omnidat-apps,shadyroulette-overflow,1)
exten => 8818,1,Goto(omnidat-direct,fax-receive,1)
exten => 8819,1,Goto(omnidat-operator,printdesk-trouble,1)
exten => 8820,1,Goto(omnidat-direct,direct-modem-1,1)
exten => 8821,1,Goto(omnidat-direct,direct-modem-2,1)
exten => 8822,1,Goto(omnidat-direct,direct-pad-1,1)
exten => 8823,1,Goto(omnidat-direct,direct-pad-2,1)
exten => _88XX,1,Goto(omnidat-intercept,unassigned,1)

[omnidat-operator]
exten => trustdesk,1,NoOp(OMNIDAT TrustDesk)
 same => n,Playback(omnidat/trustdesk)
 same => n,Dial(PJSIP/operator-01&PJSIP/operator-02,30)
 same => n,Goto(omnidat-intercept,busy,1)

exten => printdesk-trouble,1,NoOp(OMNIDAT Print Desk / Trouble)
 same => n,Dial(PJSIP/operator-01&PJSIP/operator-02,30)
 same => n,Goto(omnidat-intercept,busy,1)

[omnidat-ivr]
exten => network-status,1,Playback(omnidat/network-status)
 same => n,Hangup()

exten => media-request,1,Playback(omnidat/media-request)
 same => n,Hangup()

[omnidat-hunt]
exten => bbs-main,1,Dial(PJSIP/modem-01&PJSIP/modem-02&PJSIP/modem-03&PJSIP/modem-04,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => bbs-experimental,1,Dial(PJSIP/modem-05,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => modem-pool,1,Dial(PJSIP/modem-01&PJSIP/modem-02&PJSIP/modem-03&PJSIP/modem-04&PJSIP/modem-05&PJSIP/modem-06,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => packet-main,1,Dial(PJSIP/pad-01&PJSIP/pad-02&PJSIP/pad-03&PJSIP/pad-04,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => terminal-updates,1,Dial(PJSIP/pad-update-01&PJSIP/pad-update-02,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => nightmarkt-directory,1,Dial(PJSIP/pad-directory-01&PJSIP/pad-directory-02,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => miliways-food,1,Dial(PJSIP/pad-food-01&PJSIP/pad-food-02,45)
 same => n,Goto(omnidat-intercept,busy,1)

exten => activity-passport,1,Dial(PJSIP/pad-passport-01&PJSIP/pad-passport-02,45)
 same => n,Goto(omnidat-intercept,busy,1)

[omnidat-direct]
exten => sysop-access,1,Dial(PJSIP/modem-sysop,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => terminal-login,1,Dial(PJSIP/modem-shell,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => store-forward,1,Dial(PJSIP/modem-uucp,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => file-drop,1,Dial(PJSIP/modem-filedrop,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => test-modem,1,Dial(PJSIP/modem-test,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => fax-receive,1,Dial(PJSIP/fax-01,60)
 same => n,Goto(omnidat-intercept,busy,1)
exten => direct-modem-1,1,Dial(PJSIP/modem-01,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => direct-modem-2,1,Dial(PJSIP/modem-02,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => direct-pad-1,1,Dial(PJSIP/pad-01,45)
 same => n,Goto(omnidat-intercept,busy,1)
exten => direct-pad-2,1,Dial(PJSIP/pad-02,45)
 same => n,Goto(omnidat-intercept,busy,1)

[omnidat-apps]
exten => shadyroulette-main,1,NoOp(Hand off to ShadyRoulette main)
 same => n,Goto(omnidat-intercept,maintenance,1)
exten => shadyroulette-overflow,1,NoOp(Hand off to ShadyRoulette overflow)
 same => n,Goto(omnidat-intercept,maintenance,1)

[omnidat-intercept]
exten => busy,1,Playback(omnidat/all-circuits-busy)
 same => n,Hangup()
exten => maintenance,1,Playback(omnidat/service-maintenance)
 same => n,Hangup()
exten => unassigned,1,Playback(omnidat/unassigned)
 same => n,Hangup()
